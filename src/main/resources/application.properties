spring.application.name=lab-padroes-projeto-spring
debug=true
# Configurań§es do Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o Console do H2 no navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configurań§es do Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Cria as tabelas automaticamente e as apaga ao fechar a aplicańŃo (ideal para testes)
spring.jpa.hibernate.ddl-auto=update
# Mostra o SQL gerado no console (ajuda muito no debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true